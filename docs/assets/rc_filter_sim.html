<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RC Filter Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: transparent; margin: 0; padding: 20px; color: #333; }
        .slider-container { display: flex; align-items: center; margin-bottom: 20px; }
        input[type="range"] { flex-grow: 1; margin: 0 15px; }
        .value-display { font-weight: bold; width: 60px; text-align: right; }
    </style>
</head>
<body>
    <div class="slider-container">
        <label for="rcSlider">RC 常数:</label>
        <input type="range" id="rcSlider" min="0.01" max="2.0" step="0.01" value="0.1">
        <span class="value-display" id="rcValue">0.10</span>
    </div>
    <canvas id="filterChart"></canvas>

    <script>
        const ctx = document.getElementById('filterChart').getContext('2d');
        const wValues = [];
        for (let w = -40; w <= 40; w += 0.5) { wValues.push(w); }

        // 矩形脉冲的频谱 (Sinc函数)
        const getXw = (w) => w === 0 ? 1 : Math.abs(2 * Math.sin(w / 2) / w);

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: wValues,
                datasets: [
                    { label: '输入脉冲频谱 |X(ω)|', data: wValues.map(getXw), borderColor: 'rgba(156, 163, 175, 0.6)', borderDash: [5, 5], pointRadius: 0, borderWidth: 2 },
                    { label: '滤波器频响 |H(ω)|', data: [], borderColor: 'rgba(59, 130, 246, 1)', pointRadius: 0, borderWidth: 2 },
                    { label: '输出频谱 |Y(ω)|', data: [], borderColor: 'rgba(239, 68, 68, 1)', pointRadius: 0, borderWidth: 2, backgroundColor: 'rgba(239, 68, 68, 0.1)', fill: true }
                ]
            },
            options: { responsive: true, animation: { duration: 0 }, interaction: { intersect: false }, scales: { y: { beginAtZero: true, max: 1.1 }, x: { title: { display: true, text: '角频率 ω (rad/s)' } } } }
        });

        function updateChart() {
            const rc = parseFloat(document.getElementById('rcSlider').value);
            document.getElementById('rcValue').innerText = rc.toFixed(2);
            
            const hwData = wValues.map(w => (1 / rc) / Math.sqrt(w * w + (1 / rc) * (1 / rc)));
            const ywData = wValues.map((w, i) => getXw(w) * hwData[i]);

            chart.data.datasets[1].data = hwData;
            chart.data.datasets[2].data = ywData;
            chart.update();
        }

        document.getElementById('rcSlider').addEventListener('input', updateChart);
        updateChart(); // 初始化
    </script>
</body>
</html>
