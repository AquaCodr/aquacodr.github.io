# 网站基础信息
site_name: AquaCodr's Blog
site_description: 学以聚之，思以辨之，偶得而栖之
site_author: AquaCodr
site_url: https://aquacodr.github.io/

# 主题配置
theme:
  name: material
  language: zh
  icon:
    logo: material/school-outline           # 新增：极简学术风 Logo
  favicon: assets/favicon.svg
  
  # 定制字体：提升代码和正文的阅读质感
  font:
    text: Noto Sans SC       
    code: JetBrains Mono     

  # 日夜间沉浸配色切换
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到夜间模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到浅色模式

  # 启用核心功能（已剔除冗余，加入性能优化与标签）
  features:
    - announce.dismiss
    - header.autohide       # 自动隐藏顶栏，提供沉浸阅读空间
    - navigation.tracking
    - navigation.tabs
    #- navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.prune      # 精简左侧导航树，提升加载速度
    - navigation.tags       # 新增：在文章顶部显示标签
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.tooltips
    - content.code.copy
    - content.action.edit
    - content.action.view
    - content.code.annotate
    #- palette.toggle


# 左下角的版权声明
copyright: Copyright &copy; 2026 AquaCodr/All Rights Reserved. 

# 额外配置（已清理错误的 math 语法）
extra:
  generator: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aquacodr
      name: GitHub
    - icon: fontawesome/regular/envelope
      link: mailto:214977067@qq.com
      name: 联系我

# 引入 MathJax 引擎
extra_javascript:
  - js/mathjax-config.js  
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# 新增：引入自定义 CSS 特效
extra_css:
  - stylesheets/custom.css

# 插件配置
plugins:
  - search
  - roamlinks
  - callouts
  - awesome-pages:
      collapse_single_pages: true
  - tags                  # 新增：启用标签解析插件
  - git-revision-date-localized:
      enabled: true
      type: date
      locale: zh_CN

# Markdown 扩展
markdown_extensions:
  # ========== 核心功能 ==========
  - nl2br
  - admonition                 
  - toc:                           
      permalink: true             
      toc_depth: 3                
  - pymdownx.highlight:            
      linenums: true              
      anchor_linenums: true       
      line_spans: "line"          
  - pymdownx.superfences:          
      custom_fences:
        - name: mermaid           
          class: mermaid
  - def_list                      
  
  # ========== 实用功能 ==========
  - pymdownx.details              
  - pymdownx.emoji:                
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:             
      custom_checkbox: true       
  - footnotes                     
  
  # ========== 新增：排版与增强工具 ==========
  - meta                          # 允许在文章头部添加 YAML 元数据
  - attr_list                     # 允许自定义图片大小，例如：![图](img.png){width="300"}
  - md_in_html                    # 允许在 HTML 标签内使用 Markdown
  
  # ========== 极简公式渲染配置 ==========
  - pymdownx.arithmatex:
      generic: true               # 仅保留通用模式，具体解析交由 mathjax-config.js